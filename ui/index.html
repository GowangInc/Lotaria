<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lotaria</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: transparent;
    font-family: 'Segoe UI', system-ui, sans-serif;
    user-select: none;
  }

  #app {
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-end;
    position: relative;
  }

  /* ---- Speech Bubble ---- */
  #bubble {
    position: absolute;
    bottom: 160px;
    left: 50%;
    transform: translateX(-50%);
    max-width: 340px;
    min-width: 120px;
    background: #1a1a2e;
    color: #e0e0e0;
    border: 2px solid #e94560;
    border-radius: 12px;
    padding: 12px 16px;
    font-size: 13px;
    line-height: 1.45;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
    z-index: 10;
    box-shadow: 0 4px 24px rgba(233,69,96,0.25);
  }
  #bubble.visible {
    opacity: 1;
    pointer-events: auto;
  }
  #bubble::after {
    content: '';
    position: absolute;
    bottom: -10px;
    left: 50%;
    transform: translateX(-50%);
    border-left: 10px solid transparent;
    border-right: 10px solid transparent;
    border-top: 10px solid #e94560;
  }

  /* ---- Character Container ---- */
  #character {
    width: 120px;
    height: 140px;
    cursor: grab;
    position: relative;
    z-index: 5;
  }
  #character:active { cursor: grabbing; }

  /* Idle bobbing */
  @keyframes bob {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-6px); }
  }
  #character.idle { animation: bob 2.5s ease-in-out infinite; }

  /* Roasting shake */
  @keyframes shake {
    0%, 100% { transform: translateX(0) rotate(0); }
    20% { transform: translateX(-4px) rotate(-2deg); }
    40% { transform: translateX(4px) rotate(2deg); }
    60% { transform: translateX(-3px) rotate(-1deg); }
    80% { transform: translateX(3px) rotate(1deg); }
  }
  #character.roasting { animation: shake 0.4s ease-in-out infinite; }

  /* Thinking pulse */
  @keyframes think-pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.06); }
  }
  #character.thinking { animation: think-pulse 0.8s ease-in-out infinite; }

  /* Eye blink */
  .eye-open  { display: block; }
  .eye-shut  { display: none; }
  #character.blink .eye-open  { display: none; }
  #character.blink .eye-shut  { display: block; }

  /* Mouth states */
  .mouth-closed { display: block; }
  .mouth-open   { display: none; }
  #character.roasting .mouth-closed { display: none; }
  #character.roasting .mouth-open   { display: block; }
  #character.thinking .mouth-closed { display: none; }
  #character.thinking .mouth-open   { display: block; }

  /* ---- Context Menu ---- */
  #ctx-menu {
    display: none;
    position: fixed;
    background: #16213e;
    border: 1px solid #e94560;
    border-radius: 8px;
    padding: 6px 0;
    min-width: 200px;
    z-index: 100;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    font-size: 13px;
  }
  #ctx-menu.open { display: block; }

  .ctx-item {
    padding: 8px 16px;
    color: #e0e0e0;
    cursor: pointer;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .ctx-item:hover { background: #1a1a2e; }
  .ctx-item.danger { color: #e94560; }
  .ctx-item.danger:hover { background: #2a0a14; }

  .ctx-sep {
    height: 1px;
    background: #2a2a4a;
    margin: 4px 0;
  }

  .ctx-label { flex: 1; }
  .ctx-value {
    color: #888;
    font-size: 11px;
    margin-left: 12px;
  }
  .ctx-check {
    color: #e94560;
    font-weight: bold;
    margin-left: 8px;
    font-size: 14px;
  }

  /* Sub-menu for intervals */
  .ctx-sub > .ctx-submenu {
    display: none;
    padding: 2px 0 2px 12px;
    background: #111a30;
    border-top: 1px solid #2a2a4a;
  }
  .ctx-sub:hover > .ctx-submenu { display: block; }
  .ctx-sub > .ctx-submenu .ctx-item {
    font-size: 12px;
    padding: 6px 16px;
  }

  /* ---- Status indicator ---- */
  #status {
    position: absolute;
    bottom: 8px;
    right: 8px;
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: #555;
    z-index: 20;
  }
  #status.active {
    background: #00ff88;
    box-shadow: 0 0 6px #00ff88;
    animation: pulse-dot 2s infinite;
  }
  @keyframes pulse-dot {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }

  /* ---- Settings Modal ---- */
  #settings-overlay {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.7);
    z-index: 200;
    justify-content: center;
    align-items: center;
  }
  #settings-overlay.open {
    display: flex;
  }

  #settings-modal {
    background: #16213e;
    border: 2px solid #e94560;
    border-radius: 12px;
    width: 360px;
    max-height: 90vh;
    overflow-y: auto;
    padding: 20px;
    color: #e0e0e0;
    font-size: 13px;
  }

  #settings-modal h2 {
    margin: 0 0 16px 0;
    font-size: 16px;
    color: #e94560;
    text-align: center;
  }

  .settings-section {
    margin-bottom: 16px;
  }

  .settings-section h3 {
    font-size: 12px;
    text-transform: uppercase;
    color: #888;
    margin-bottom: 8px;
    letter-spacing: 1px;
  }

  .key-row {
    display: flex;
    align-items: center;
    margin-bottom: 6px;
    gap: 6px;
  }

  .key-row label {
    width: 90px;
    font-size: 12px;
    color: #aaa;
    flex-shrink: 0;
  }

  .key-row input {
    flex: 1;
    background: #111a30;
    border: 1px solid #2a2a4a;
    border-radius: 4px;
    padding: 5px 8px;
    color: #e0e0e0;
    font-size: 12px;
    font-family: monospace;
    outline: none;
  }
  .key-row input:focus {
    border-color: #e94560;
  }

  .key-row .key-status {
    width: 18px;
    text-align: center;
    font-size: 14px;
    flex-shrink: 0;
  }

  .key-row .key-status.set { color: #00ff88; }
  .key-row .key-status.unset { color: #555; }

  .settings-select {
    width: 100%;
    background: #111a30;
    border: 1px solid #2a2a4a;
    border-radius: 4px;
    padding: 6px 8px;
    color: #e0e0e0;
    font-size: 12px;
    outline: none;
    margin-bottom: 6px;
    cursor: pointer;
  }
  .settings-select:focus {
    border-color: #e94560;
  }

  .select-group {
    margin-bottom: 8px;
  }

  .select-group label {
    display: block;
    font-size: 11px;
    color: #888;
    margin-bottom: 3px;
  }

  .settings-btn-row {
    display: flex;
    gap: 8px;
    margin-top: 16px;
  }

  .settings-btn {
    flex: 1;
    padding: 8px;
    border: none;
    border-radius: 6px;
    font-size: 13px;
    cursor: pointer;
    font-family: inherit;
  }

  .settings-btn.primary {
    background: #e94560;
    color: #fff;
  }
  .settings-btn.primary:hover {
    background: #d63651;
  }

  .settings-btn.secondary {
    background: #2a2a4a;
    color: #e0e0e0;
  }
  .settings-btn.secondary:hover {
    background: #3a3a5a;
  }

  .save-keys-btn {
    background: #e94560;
    color: #fff;
    border: none;
    border-radius: 4px;
    padding: 4px 10px;
    font-size: 11px;
    cursor: pointer;
    flex-shrink: 0;
  }
  .save-keys-btn:hover {
    background: #d63651;
  }
</style>
</head>
<body>
<div id="app">
  <!-- Speech bubble -->
  <div id="bubble"></div>

  <!-- Character (drag region) -->
  <div id="character" class="idle pywebview-drag-region">
    <svg viewBox="0 0 120 140" width="120" height="140" xmlns="http://www.w3.org/2000/svg">
      <!-- Body -->
      <rect x="20" y="50" width="80" height="70" rx="16" fill="#e94560"/>
      <!-- Head -->
      <rect x="25" y="10" width="70" height="55" rx="14" fill="#1a1a2e" stroke="#e94560" stroke-width="2"/>
      <!-- Eyes open -->
      <g class="eye-open">
        <rect x="40" y="30" width="12" height="14" rx="3" fill="#e94560"/>
        <rect x="68" y="30" width="12" height="14" rx="3" fill="#e94560"/>
        <!-- Pupils -->
        <rect id="pupil-l" x="44" y="36" width="5" height="6" rx="1" fill="#fff"/>
        <rect id="pupil-r" x="72" y="36" width="5" height="6" rx="1" fill="#fff"/>
      </g>
      <!-- Eyes shut (blink) -->
      <g class="eye-shut">
        <line x1="40" y1="37" x2="52" y2="37" stroke="#e94560" stroke-width="3" stroke-linecap="round"/>
        <line x1="68" y1="37" x2="80" y2="37" stroke="#e94560" stroke-width="3" stroke-linecap="round"/>
      </g>
      <!-- Mouth closed (smirk) -->
      <path class="mouth-closed" d="M48 52 Q60 58 72 52" stroke="#e94560" stroke-width="2" fill="none" stroke-linecap="round"/>
      <!-- Mouth open (roasting) -->
      <ellipse class="mouth-open" cx="60" cy="52" rx="10" ry="6" fill="#e94560"/>
      <!-- Arms -->
      <rect x="8" y="60" width="14" height="40" rx="7" fill="#e94560"/>
      <rect x="98" y="60" width="14" height="40" rx="7" fill="#e94560"/>
      <!-- Feet -->
      <rect x="30" y="115" width="22" height="14" rx="7" fill="#e94560"/>
      <rect x="68" y="115" width="22" height="14" rx="7" fill="#e94560"/>
      <!-- Devil horns -->
      <polygon points="30,14 38,2 40,18" fill="#e94560"/>
      <polygon points="90,14 82,2 80,18" fill="#e94560"/>
    </svg>
  </div>

  <!-- Status dot -->
  <div id="status"></div>
</div>

<!-- Context Menu -->
<div id="ctx-menu">
  <div class="ctx-item" data-action="roast">Roast Me Now</div>
  <div class="ctx-item" data-action="toggle-monitor">
    <span class="ctx-label" id="ctx-monitor-label">Start Watching</span>
  </div>
  <div class="ctx-sep"></div>
  <div class="ctx-item" data-action="settings">
    <span class="ctx-label">Settings...</span>
    <span class="ctx-value" id="ctx-settings-summary"></span>
  </div>
  <div class="ctx-sub">
    <div class="ctx-item">
      <span class="ctx-label">Interval</span>
      <span class="ctx-value" id="ctx-interval-val">5m</span>
    </div>
    <div class="ctx-submenu">
      <div class="ctx-item" data-action="set-interval" data-value="120">2 min</div>
      <div class="ctx-item" data-action="set-interval" data-value="300">5 min</div>
      <div class="ctx-item" data-action="set-interval" data-value="600">10 min</div>
    </div>
  </div>
  <div class="ctx-sep"></div>
  <div class="ctx-item" data-action="toggle-bubble">
    <span class="ctx-label">Speech Bubble</span>
    <span class="ctx-check" id="chk-bubble"></span>
  </div>
  <div class="ctx-item" data-action="toggle-audio">
    <span class="ctx-label">Audio</span>
    <span class="ctx-check" id="chk-audio"></span>
  </div>
  <div class="ctx-sep"></div>
  <div class="ctx-item danger" data-action="quit">Quit</div>
</div>

<!-- Settings Modal -->
<div id="settings-overlay">
  <div id="settings-modal">
    <h2>Settings</h2>

    <!-- API Keys -->
    <div class="settings-section">
      <h3>API Keys</h3>
      <div id="api-keys-list"></div>
    </div>

    <!-- Vision -->
    <div class="settings-section">
      <h3>Vision</h3>
      <div class="select-group">
        <label>Provider</label>
        <select class="settings-select" id="vision-provider-select"></select>
      </div>
      <div class="select-group">
        <label>Model</label>
        <select class="settings-select" id="vision-model-select"></select>
      </div>
    </div>

    <!-- TTS -->
    <div class="settings-section">
      <h3>Text-to-Speech</h3>
      <div class="select-group">
        <label>Provider</label>
        <select class="settings-select" id="tts-provider-select"></select>
      </div>
      <div class="select-group">
        <label>Model</label>
        <select class="settings-select" id="tts-model-select"></select>
      </div>
      <div class="select-group" id="tts-voice-group">
        <label>Voice</label>
        <select class="settings-select" id="tts-voice-select"></select>
      </div>
    </div>

    <div class="settings-btn-row">
      <button class="settings-btn secondary" id="settings-cancel">Cancel</button>
      <button class="settings-btn primary" id="settings-save">Save</button>
    </div>
  </div>
</div>

<script>
// ========== State ==========
let cfg = {
  is_active: false,
  interval: 300,
  vision_provider: 'gemini',
  vision_model: 'gemini/gemini-2.0-flash',
  tts_provider: 'gemini',
  tts_model: 'gemini/gemini-2.5-flash-preview-tts',
  tts_voice: 'Kore',
  api_keys: {},
  speech_bubble_enabled: true,
  audio_enabled: true,
};
let providers = {};
let bubbleTimeout = null;
let currentAudio = null;
let isRoasting = false;

// ========== DOM refs ==========
const character = document.getElementById('character');
const bubble = document.getElementById('bubble');
const ctxMenu = document.getElementById('ctx-menu');
const statusDot = document.getElementById('status');
const settingsOverlay = document.getElementById('settings-overlay');

// ========== Eye blinking ==========
function blink() {
  character.classList.add('blink');
  setTimeout(() => character.classList.remove('blink'), 150);
}
setInterval(() => {
  if (Math.random() < 0.3) blink();
}, 2500);

// ========== Config sync ==========
function onConfigLoaded(c) {
  cfg = { ...cfg, ...c };
  updateMenuState();
}

function updateMenuState() {
  // Monitor label
  document.getElementById('ctx-monitor-label').textContent =
    cfg.is_active ? 'Stop Watching' : 'Start Watching';

  // Status dot
  statusDot.className = cfg.is_active ? 'active' : '';

  // Settings summary
  const vShort = cfg.vision_model ? cfg.vision_model.split('/').pop() : '?';
  document.getElementById('ctx-settings-summary').textContent = vShort;

  // Interval
  const m = Math.round(cfg.interval / 60);
  document.getElementById('ctx-interval-val').textContent = m + 'm';

  // Toggles
  document.getElementById('chk-bubble').textContent = cfg.speech_bubble_enabled ? '\u2713' : '';
  document.getElementById('chk-audio').textContent = cfg.audio_enabled ? '\u2713' : '';
}

// ========== Speech Bubble ==========
function showBubble(text) {
  if (!cfg.speech_bubble_enabled) return;

  clearTimeout(bubbleTimeout);
  bubble.textContent = '';
  bubble.classList.add('visible');

  let i = 0;
  const speed = 25;
  function typeChar() {
    if (i < text.length) {
      bubble.textContent += text[i];
      i++;
      setTimeout(typeChar, speed);
    }
  }
  typeChar();

  bubbleTimeout = setTimeout(hideBubble, Math.max(10000, text.length * speed + 2000));
}

function hideBubble() {
  bubble.classList.remove('visible');
  clearTimeout(bubbleTimeout);
}

// ========== Audio ==========
function playAudio(b64) {
  if (!cfg.audio_enabled || !b64) return;
  stopAudio();
  currentAudio = new Audio('data:audio/wav;base64,' + b64);
  currentAudio.onended = () => {
    currentAudio = null;
    setTimeout(hideBubble, 1500);
  };
  currentAudio.play().catch(e => console.warn('Audio play failed:', e));
}

function stopAudio() {
  if (currentAudio) {
    currentAudio.pause();
    currentAudio = null;
  }
}

// ========== Roast delivery (called from Python) ==========
function deliverRoast(result) {
  isRoasting = true;
  character.className = 'roasting pywebview-drag-region';

  showBubble(result.text);
  playAudio(result.audio_b64);

  const duration = result.audio_b64 ? 8000 : 4000;
  setTimeout(() => {
    if (isRoasting) {
      character.className = 'idle pywebview-drag-region';
      isRoasting = false;
    }
  }, duration);
}

function onThinkingStart() {
  character.className = 'thinking pywebview-drag-region';
  showBubble('...');
}

// ========== Settings Modal ==========
async function openSettings() {
  const api = window.pywebview ? window.pywebview.api : null;
  if (!api) return;

  // Load providers and current config
  providers = await api.get_providers();
  const maskedKeys = await api.get_api_keys();

  buildApiKeysUI(maskedKeys);
  buildVisionUI();
  buildTtsUI();

  settingsOverlay.classList.add('open');
}

function closeSettings() {
  settingsOverlay.classList.remove('open');
}

function buildApiKeysUI(maskedKeys) {
  const container = document.getElementById('api-keys-list');
  container.innerHTML = '';

  for (const [provKey, prov] of Object.entries(providers)) {
    if (!prov.env_var) continue; // skip "local"

    const row = document.createElement('div');
    row.className = 'key-row';

    const hasKey = maskedKeys[provKey] && maskedKeys[provKey].length > 0;

    row.innerHTML = `
      <label>${prov.name}</label>
      <input type="password" id="key-input-${provKey}"
             placeholder="${hasKey ? maskedKeys[provKey] : 'Enter API key...'}"
             autocomplete="off" />
      <span class="key-status ${hasKey ? 'set' : 'unset'}"
            id="key-status-${provKey}">${hasKey ? '\u2713' : '\u2022'}</span>
      <button class="save-keys-btn" data-provider="${provKey}">Save</button>
    `;
    container.appendChild(row);
  }

  // Individual save buttons
  container.addEventListener('click', async (e) => {
    const btn = e.target.closest('.save-keys-btn');
    if (!btn) return;
    const prov = btn.dataset.provider;
    const input = document.getElementById('key-input-' + prov);
    const val = input.value.trim();
    if (!val) return;

    const api = window.pywebview.api;
    await api.save_api_key(prov, val);
    input.value = '';
    input.placeholder = '...' + val.slice(-4);
    const statusEl = document.getElementById('key-status-' + prov);
    statusEl.textContent = '\u2713';
    statusEl.className = 'key-status set';

    // Refresh dropdowns since available providers may have changed
    buildVisionUI();
    buildTtsUI();
  });
}

function getProvidersWithKeys() {
  // Providers that have a key set (check cfg.api_keys or env-loaded keys)
  const withKeys = new Set(['local']); // local always available
  for (const [provKey, prov] of Object.entries(providers)) {
    if (!prov.env_var) continue;
    const statusEl = document.getElementById('key-status-' + provKey);
    if (statusEl && statusEl.classList.contains('set')) {
      withKeys.add(provKey);
    }
  }
  return withKeys;
}

function buildVisionUI() {
  const provSelect = document.getElementById('vision-provider-select');
  const modelSelect = document.getElementById('vision-model-select');
  const availableProvs = getProvidersWithKeys();

  provSelect.innerHTML = '';
  for (const [provKey, prov] of Object.entries(providers)) {
    if (prov.vision_models.length === 0) continue;
    if (!availableProvs.has(provKey)) continue;
    const opt = document.createElement('option');
    opt.value = provKey;
    opt.textContent = prov.name;
    if (provKey === cfg.vision_provider) opt.selected = true;
    provSelect.appendChild(opt);
  }

  function updateVisionModels() {
    const selProv = provSelect.value;
    const prov = providers[selProv];
    modelSelect.innerHTML = '';
    if (!prov) return;
    for (const m of prov.vision_models) {
      const opt = document.createElement('option');
      opt.value = m;
      opt.textContent = m.split('/').pop();
      if (m === cfg.vision_model) opt.selected = true;
      modelSelect.appendChild(opt);
    }
  }

  provSelect.onchange = updateVisionModels;
  updateVisionModels();
}

function buildTtsUI() {
  const provSelect = document.getElementById('tts-provider-select');
  const modelSelect = document.getElementById('tts-model-select');
  const voiceSelect = document.getElementById('tts-voice-select');
  const voiceGroup = document.getElementById('tts-voice-group');
  const availableProvs = getProvidersWithKeys();

  provSelect.innerHTML = '';
  for (const [provKey, prov] of Object.entries(providers)) {
    if (prov.tts_models.length === 0) continue;
    if (!availableProvs.has(provKey)) continue;
    const opt = document.createElement('option');
    opt.value = provKey;
    opt.textContent = prov.name;
    if (provKey === cfg.tts_provider) opt.selected = true;
    provSelect.appendChild(opt);
  }

  function updateTtsModels() {
    const selProv = provSelect.value;
    const prov = providers[selProv];
    modelSelect.innerHTML = '';
    voiceSelect.innerHTML = '';
    if (!prov) return;

    for (const m of prov.tts_models) {
      const opt = document.createElement('option');
      opt.value = m;
      opt.textContent = m.split('/').pop();
      if (m === cfg.tts_model) opt.selected = true;
      modelSelect.appendChild(opt);
    }

    if (prov.tts_voices && prov.tts_voices.length > 0) {
      voiceGroup.style.display = '';
      for (const v of prov.tts_voices) {
        const opt = document.createElement('option');
        opt.value = v;
        opt.textContent = v;
        if (v === cfg.tts_voice) opt.selected = true;
        voiceSelect.appendChild(opt);
      }
    } else {
      voiceGroup.style.display = 'none';
    }
  }

  provSelect.onchange = updateTtsModels;
  updateTtsModels();
}

// Save & Cancel
document.getElementById('settings-save').addEventListener('click', async () => {
  const api = window.pywebview ? window.pywebview.api : null;
  if (!api) return;

  const visionProv = document.getElementById('vision-provider-select').value;
  const visionModel = document.getElementById('vision-model-select').value;
  const ttsProv = document.getElementById('tts-provider-select').value;
  const ttsModel = document.getElementById('tts-model-select').value;
  const ttsVoice = document.getElementById('tts-voice-select').value || '';

  await api.set_vision_config(visionProv, visionModel);
  await api.set_tts_config(ttsProv, ttsModel, ttsVoice);

  cfg.vision_provider = visionProv;
  cfg.vision_model = visionModel;
  cfg.tts_provider = ttsProv;
  cfg.tts_model = ttsModel;
  cfg.tts_voice = ttsVoice;

  updateMenuState();
  closeSettings();
});

document.getElementById('settings-cancel').addEventListener('click', closeSettings);

// Close modal on overlay click (but not modal itself)
settingsOverlay.addEventListener('click', (e) => {
  if (e.target === settingsOverlay) closeSettings();
});

// ========== Eye Tracking ==========
const pupilL = document.getElementById('pupil-l');
const pupilR = document.getElementById('pupil-r');
// Base positions (center of eye socket)
const eyeL = { cx: 46, cy: 37 }; // left eye center
const eyeR = { cx: 74, cy: 37 }; // right eye center
const maxOffset = 3; // max pixel offset for pupil movement

document.addEventListener('mousemove', (e) => {
  const charRect = character.getBoundingClientRect();
  const charCX = charRect.left + charRect.width / 2;
  const charCY = charRect.top + charRect.height * 0.3; // eyes are in upper portion

  const dx = e.clientX - charCX;
  const dy = e.clientY - charCY;
  const dist = Math.sqrt(dx * dx + dy * dy) || 1;

  const ox = Math.round((dx / dist) * maxOffset);
  const oy = Math.round((dy / dist) * Math.min(maxOffset, 2));

  pupilL.setAttribute('x', 44 + ox);
  pupilL.setAttribute('y', 36 + oy);
  pupilR.setAttribute('x', 72 + ox);
  pupilR.setAttribute('y', 36 + oy);
});

// ========== Context Menu ==========
document.addEventListener('contextmenu', (e) => {
  e.preventDefault();
  if (settingsOverlay.classList.contains('open')) return;
  updateMenuState();
  let x = e.clientX;
  let y = e.clientY;
  ctxMenu.classList.add('open');
  const rect = ctxMenu.getBoundingClientRect();
  if (x + rect.width > window.innerWidth) x = window.innerWidth - rect.width - 4;
  if (y + rect.height > window.innerHeight) y = window.innerHeight - rect.height - 4;
  ctxMenu.style.left = x + 'px';
  ctxMenu.style.top = y + 'px';
});

document.addEventListener('click', (e) => {
  if (!e.target.closest('#ctx-menu')) {
    ctxMenu.classList.remove('open');
  }
});

// Menu actions
ctxMenu.addEventListener('click', async (e) => {
  const item = e.target.closest('[data-action]');
  if (!item) return;
  ctxMenu.classList.remove('open');

  const action = item.dataset.action;
  const value = item.dataset.value;
  const api = window.pywebview ? window.pywebview.api : null;

  switch (action) {
    case 'roast':
      if (!api) break;
      const result = await api.roast_now();
      if (result) deliverRoast(result);
      break;

    case 'toggle-monitor':
      if (!api) break;
      const active = await api.toggle_monitoring();
      cfg.is_active = active;
      updateMenuState();
      break;

    case 'settings':
      openSettings();
      break;

    case 'set-interval':
      if (!api) break;
      await api.set_config('interval', parseInt(value));
      cfg.interval = parseInt(value);
      updateMenuState();
      break;

    case 'toggle-bubble':
      cfg.speech_bubble_enabled = !cfg.speech_bubble_enabled;
      if (api) await api.set_config('speech_bubble_enabled', cfg.speech_bubble_enabled);
      if (!cfg.speech_bubble_enabled) hideBubble();
      updateMenuState();
      break;

    case 'toggle-audio':
      cfg.audio_enabled = !cfg.audio_enabled;
      if (api) await api.set_config('audio_enabled', cfg.audio_enabled);
      if (!cfg.audio_enabled) stopAudio();
      updateMenuState();
      break;

    case 'quit':
      if (api) await api.quit();
      break;
  }
});
</script>
